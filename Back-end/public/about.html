<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>About Us</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* Full height of the viewport */
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    .content-container {
      width: 80%;
      max-width: 600px;
      padding: 20px;
      background-color: #f9f9f9;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin-bottom: 20px;
    }

    p {
      font-family:"treeserif";
      line-height: 1.6;
    }

    a {
      display: block;
      margin-top: 20px;
      text-decoration: none;
      color: #007BFF;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="content-container">
    <h1>About Us</h1>
    <p>At Luxury Voyages, we are dedicated to providing our customers with unparalleled travel experiences. Our expert team is committed to making your journey memorable.</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
