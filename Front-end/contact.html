<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Contact Us</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh; /* Full height of the viewport */
      margin: 0;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    .content-container {
      width: 80%;
      max-width: 600px;
      padding: 20px;
      background-color: #f9f9f9;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin-bottom: 20px;
font-family:"lobster";
    }

    p {
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background-color: #0056b3;
    }

    a {
      display: block;
      margin-top: 20px;
      text-decoration: none;
      color: #007BFF;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="content-container">
    <h1>Contact Us</h1>
    <p>If you have any questions or would like to know more about our services, please reach out to us.</p>
    
    <h2>Your Queries</h2>
    <form id="query-form">
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="query">Your Query:</label>
        <textarea id="query" name="query" rows="4" required></textarea>
      </div>
      <button type="submit">Submit Query</button>
    </form>

    <h2>Your Experiences</h2>
    <form id="experience-form">
      <div class="form-group">
        <label for="exp-name">Name:</label>
        <input type="text" id="exp-name" name="exp-name" required>
      </div>
      <div class="form-group">
        <label for="experience">Your Experience:</label>
        <textarea id="experience" name="experience" rows="4" required></textarea>
      </div>
      <button type="submit">Submit Experience</button>
    </form>

    <a href="index.html">Back to Home</a>
  </div>
  
  <script>
  const queryForm = document.getElementById('query-form');
  const experienceForm = document.getElementById('experience-form');

  queryForm.addEventListener('submit', function(event) {
    event.preventDefault();
    window.location.href = 'submission.html'; // Redirect to submission.html
  });

  experienceForm.addEventListener('submit', function(event) {
    event.preventDefault();
    window.location.href = 'submission.html'; // Redirect to submission.html
  });
</script>

</body>
</html>
